<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WealthAurora • Felipe & Manu</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e17;--bg2:#111520;--bg3:#181d2b;--bg4:#1f2535;--bg5:#272e40;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#e8ecf8;--text2:#8b93b0;--text3:#4e566e;
  --green:#2de08b;--green2:rgba(45,224,139,.13);--green3:rgba(45,224,139,.22);
  --red:#ff4d5e;--red2:rgba(255,77,94,.12);--red3:rgba(255,77,94,.22);
  --amber:#ffb13d;--amber2:rgba(255,177,61,.12);--amber3:rgba(255,177,61,.22);
  --blue:#5097ff;--blue2:rgba(80,151,255,.12);
  --purple:#a78bfa;--purple2:rgba(167,139,250,.12);
  --teal:#2dd4bf;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;--r2:8px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:860px){.sidebar{display:none}}
.sidebar-logo{padding:20px 18px 18px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-gem{width:34px;height:34px;background:linear-gradient(135deg,var(--green),var(--teal));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:.6px;text-transform:uppercase}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-label{font-size:10px;color:var(--text3);letter-spacing:.7px;text-transform:uppercase;padding:10px 10px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r2);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:2px;transition:all .15s;border:1px solid transparent;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--green2);color:var(--green);border-color:rgba(45,224,139,.18)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border)}
.health-mini{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--r2);border:1px solid var(--border)}
.hring{position:relative;width:38px;height:38px;flex-shrink:0}
.hring svg{transform:rotate(-90deg)}
.hring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono)}

/* MAIN */
.main{display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(11,14,23,.92);backdrop-filter:blur(14px);z-index:100;gap:10px;flex-wrap:wrap}
.topbar-left h1{font-size:16px;font-weight:700;letter-spacing:-.4px}
.topbar-left p{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r2);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn-green{background:var(--green2);border-color:rgba(45,224,139,.25);color:var(--green)}
.btn-green:hover{background:var(--green3)}
.update-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MÊS SELETOR */
.mes-selector{display:flex;align-items:center;gap:8px}
.mes-selector label{font-size:11px;color:var(--text3);white-space:nowrap}
.mes-sel-select{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r2);padding:6px 10px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;cursor:pointer;transition:border-color .15s}
.mes-sel-select:focus{border-color:var(--green)}

/* CONTENT */
.content{padding:22px 24px;flex:1}
@media(max-width:600px){.content{padding:14px}}
.tab-panel{display:none;animation:fadeUp .2s ease both}
.tab-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* INSIGHTS */
.insights-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.insight{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:30px;font-size:11px;font-weight:500;border:1px solid;cursor:default;white-space:nowrap}
.ig{background:var(--green2);border-color:rgba(45,224,139,.2);color:var(--green)}
.ia{background:var(--amber2);border-color:rgba(255,177,61,.2);color:var(--amber)}
.ir{background:var(--red2);border-color:rgba(255,77,94,.2);color:var(--red)}
.ib{background:var(--blue2);border-color:rgba(80,151,255,.2);color:var(--blue)}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:780px){.metrics-grid{grid-template-columns:1fr 1fr}}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;position:relative;overflow:hidden;transition:border-color .2s}
.mc:hover{border-color:var(--border2)}
.mc-top{height:2px;position:absolute;top:0;left:0;right:0}
.mc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:6px}
.mc-val{font-size:19px;font-weight:700;letter-spacing:-.5px;font-family:var(--mono)}
.mc-delta{font-size:11px;margin-top:4px}

/* ── NOVO: CARD DE COMPARAÇÃO MÊS ANTERIOR vs ATUAL ── */
.compare-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px}
.compare-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.compare-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.compare-months{display:flex;gap:6px;font-size:10px}
.compare-month-badge{padding:3px 9px;border-radius:20px;font-weight:600;border:1px solid}
.cmb-prev{background:rgba(80,151,255,.1);color:var(--blue);border-color:rgba(80,151,255,.2)}
.cmb-curr{background:var(--green2);color:var(--green);border-color:rgba(45,224,139,.2)}
.compare-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:780px){.compare-grid{grid-template-columns:1fr 1fr}}
.cmp-item{background:var(--bg3);border-radius:var(--r2);padding:12px 13px;border:1px solid var(--border);position:relative;overflow:hidden}
.cmp-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px}
.cmp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cmp-mes-lbl{font-size:10px;color:var(--text3)}
.cmp-val-prev{font-size:12px;font-family:var(--mono);color:var(--text2)}
.cmp-val-curr{font-size:15px;font-weight:700;font-family:var(--mono)}
.cmp-delta-row{display:flex;align-items:center;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.cmp-delta-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.cmp-delta-txt{font-size:10px;color:var(--text3)}
.cmp-spark{position:absolute;bottom:0;right:0;opacity:.18}

/* ── NOVO: CARD TENDÊNCIA COMPLETA ── */
.trend-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px}
.trend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.trend-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.trend-legend{display:flex;gap:12px;font-size:10px}
.trend-leg-item{display:flex;align-items:center;gap:5px}
.trend-leg-dot{width:8px;height:8px;border-radius:50%}
.trend-tabs{display:flex;gap:4px}
.trend-tab{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .15s;font-family:var(--font)}
.trend-tab.active{background:var(--green2);border-color:rgba(45,224,139,.25);color:var(--green)}
.trend-chart-wrap{position:relative;height:220px}
.trend-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
@media(max-width:600px){.trend-summary{grid-template-columns:1fr}}
.ts-item{text-align:center}
.ts-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.ts-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.ts-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
@media(max-width:780px){.g2,.g3{grid-template-columns:1fr}}
.g-cartoes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
@media(max-width:780px){.g-cartoes{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.card-sub{font-size:10px;color:var(--text3)}
.chart-wrap{position:relative;height:185px}

/* SCORE */
.score-ring-big{position:relative;width:86px;height:86px;flex-shrink:0}
.score-ring-big svg{transform:rotate(-90deg)}
.score-ring-big .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-ring-big .num span:first-child{font-size:21px;font-weight:700;font-family:var(--mono)}
.score-ring-big .num span:last-child{font-size:9px;color:var(--text3)}
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sb-label{font-size:11px;color:var(--text2);width:85px;flex-shrink:0}
.sb-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px;transition:width 1s ease}
.sb-pts{font-size:10px;color:var(--text3);font-family:var(--mono);width:30px;text-align:right}

/* RESERVA */
.res-big{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--blue);margin-bottom:3px}
.res-bar{height:9px;background:var(--bg4);border-radius:5px;overflow:hidden;margin:9px 0 5px}
.res-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:5px;transition:width 1.2s ease}

/* LIMITES */
.lim-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.lim-cat{font-size:11px;color:var(--text);width:90px;flex-shrink:0}
.lim-bg{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.lim-fill{height:100%;border-radius:4px;transition:width .8s ease}
.lim-info{font-size:10px;color:var(--text3);font-family:var(--mono);width:95px;text-align:right;font-size:10px}
.lim-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;width:50px;text-align:center;flex-shrink:0}
.lt-ok{background:var(--green2);color:var(--green)}
.lt-warn{background:var(--amber2);color:var(--amber)}
.lt-over{background:var(--red2);color:var(--red)}

/* RANKING */
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-pos{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rp1{background:var(--amber2);color:var(--amber)}
.rp2{background:rgba(180,180,180,.1);color:#aaa}
.rp3{background:rgba(180,120,60,.1);color:#c8875a}
.rpn{background:var(--bg4);color:var(--text3)}
.rank-cat{flex:1;font-size:12px;color:var(--text2)}
.rank-bar-bg{width:70px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:2px;background:var(--blue)}
.rank-val{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--text);min-width:65px;text-align:right}

/* CARTÃO CARDS */
.cartao-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border-color .2s}
.cartao-card:hover{border-color:var(--border2)}
.cartao-icon{width:40px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-bottom:10px}
.ci-itau{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff}
.ci-latam{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff}
.ci-deb{background:linear-gradient(135deg,var(--green),var(--teal));color:#000}
.cartao-nome{font-size:13px;font-weight:600;margin-bottom:4px}
.cartao-total{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--red)}
.cartao-count{font-size:11px;color:var(--text3);margin-top:3px;margin-bottom:12px}
.cartao-cats{display:flex;flex-direction:column;gap:5px}
.cartao-cat-row{display:flex;justify-content:space-between;font-size:11px}
.cartao-cat-row span:first-child{color:var(--text2)}
.cartao-cat-row span:last-child{font-family:var(--mono);color:var(--text)}

/* EXTRATO */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.fsel,.finput{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:7px 11px;color:var(--text2);font-family:var(--font);font-size:12px;outline:none;cursor:pointer;transition:border-color .15s}
.fsel:focus,.finput:focus{border-color:var(--green);color:var(--text)}
.finput{min-width:160px}
.etab-wrap{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border)}
table.etab{width:100%;border-collapse:collapse;min-width:520px}
table.etab th{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:9px 13px;text-align:left;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
table.etab td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);transition:background .1s}
table.etab tr:last-child td{border-bottom:none}
table.etab tr:hover td{background:var(--bg3)}
table.etab td:last-child{text-align:right;font-family:var(--mono);font-weight:600;white-space:nowrap}
.v-neg{color:var(--red)}
.v-pos{color:var(--green)}
.pill{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--text3);border:1px solid var(--border);white-space:nowrap}
.pill-cartao{background:rgba(80,151,255,.1);color:var(--blue);border-color:rgba(80,151,255,.2)}
.pill-debito{background:var(--green2);color:var(--green);border-color:rgba(45,224,139,.2)}
.etab-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;border-top:1px solid var(--border);background:var(--bg3)}

/* DÍVIDA */
.debt-stat{background:var(--bg3);border-radius:var(--r2);padding:13px 15px;border:1px solid var(--border)}
.debt-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.debt-stat-val{font-size:17px;font-weight:700;font-family:var(--mono)}
.debt-prog-bg{height:9px;background:var(--bg4);border-radius:5px;overflow:hidden;margin:7px 0 5px}
.debt-prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:5px;transition:width 1.2s ease}
.parcela{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg3);margin-bottom:6px;transition:border-color .15s}
.parcela:hover{border-color:var(--border2)}
.parcela.prox{border-color:rgba(255,177,61,.35);background:var(--amber2)}
.parcela.paga{opacity:.4}
.p-num{font-size:10px;color:var(--text3);font-family:var(--mono);width:22px}
.p-data{font-size:11px;color:var(--text2);width:76px}
.p-lbl{flex:1;font-size:12px;color:var(--text2)}
.p-plr{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--amber2);color:var(--amber);border:1px solid rgba(255,177,61,.2)}
.p-val{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--red)}
.simulador{background:var(--bg3);border-radius:var(--r2);padding:16px;border:1px solid var(--border);margin-top:14px}
.sim-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.sim-input{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--r2);padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;width:190px}
.sim-input:focus{border-color:var(--green)}
.sim-result{background:var(--bg4);border-radius:var(--r2);padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.9;border:1px solid var(--border);display:none}
.sim-result.show{display:block}
.hl-g{color:var(--green);font-weight:700;font-family:var(--mono)}
.hl-a{color:var(--amber);font-weight:700;font-family:var(--mono)}

/* PLAN */
.fix-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.fix-row:last-child{border-bottom:none;font-weight:700;padding-top:9px;margin-top:3px}
.fix-lbl{color:var(--text2)}
.envelope{background:var(--bg3);border-radius:var(--r2);padding:14px;border:1px solid var(--border);margin-bottom:10px}
.env-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.env-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:7px}
.env-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* ALERT */
.alert-bar{display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:var(--r2);font-size:11px;margin-bottom:10px;border:1px solid}
.ab-r{background:var(--red2);border-color:rgba(255,77,94,.25);color:var(--red)}
.ab-a{background:var(--amber2);border-color:rgba(255,177,61,.25);color:var(--amber)}

/* LOADING / ERROR */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px}
.spinner{width:34px;height:34px;border:2px solid var(--bg4);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35}
</style>
</head>
<body>
<div class="layout">

<!-- ─── SIDEBAR ─────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-row">
      <div class="logo-gem">✦</div>
      <div>
        <div class="logo-name">WealthAurora</div>
        <div class="logo-sub">Felipe &amp; Manu</div>
      </div>
    </div>
  </div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────
let D = null;
let mesFiltrado = 'todos';
let charts = {};
let trendView = 'barras'; // 'barras' | 'linha' | 'saldo'

// ─── FORMATAÇÃO ───────────────────────────────────────────────
const brl = v => 'R$ ' + Math.abs(v).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const brlK = v => v >= 1000 ? 'R$ ' + (v/1000).toFixed(1) + 'k' : brl(v);
const fmtData = s => {
  if (!s) return '—';
  try {
    const d = new Date(s + 'T12:00:00');
    return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});
  } catch { return s; }
};
const fmtMesLabel = m => {
  if (!m || m.length < 7) return m;
  const nomes = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const [y, mo] = m.split('-');
  return nomes[+mo] + '/' + y.slice(2);
};
const setEl = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
const setBar = (id, val, max) => {
  const e = document.getElementById(id);
  if (e) setTimeout(() => { e.style.width = Math.min(100, (val/max*100)) + '%'; }, 150);
};
const destroyChart = id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } };
const GRID = { color:'rgba(255,255,255,0.04)' };
const TICK = { color:'#4e566e', font:{size:10, family:"'Sora'"} };
const CORES = ['#2de08b','#ff4d5e','#5097ff','#ffb13d','#a78bfa','#2dd4bf','#f97316','#e879f9'];

// ─── NAVEGAÇÃO ────────────────────────────────────────────────
function goTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const p = document.getElementById('tab-' + name);
  if (p) p.classList.add('active');
  if (el) el.classList.add('active');
}

// ─── CONTROLE DA VIEW DE TENDÊNCIA ───────────────────────────
function setTrendView(view, btn) {
  trendView = view;
  document.querySelectorAll('.trend-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Mostrar/ocultar legenda saldo
  const tlSaldo = document.getElementById('tl-saldo');
  if (tlSaldo) tlSaldo.style.display = view === 'saldo' ? 'flex' : 'none';
  if (D) renderChartTendencia();
}

// ─── FILTRO DE MÊS GLOBAL ────────────────────────────────────
function aplicarFiltroMes() {
  mesFiltrado = document.getElementById('filtro-mes-global')?.value || 'todos';
  if (!D) return;
  renderResultados();
  renderCartoes();
  filtrarExtrato();
}

function popularSeletorMes() {
  const sel = document.getElementById('filtro-mes-global');
  if (!sel || !D?.mesesDisponiveis) return;
  sel.innerHTML = '<option value="todos">Todos os meses</option>';
  D.mesesDisponiveis.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = fmtMesLabel(m);
    sel.appendChild(opt);
  });
  const agora = new Date().toISOString().slice(0, 7);
  if (D.mesesDisponiveis.includes(agora)) {
    sel.value = agora;
    mesFiltrado = agora;
  }
}

// ─── GASTOS FILTRADOS POR MÊS ────────────────────────────────
function gastosFiltrados() {
  if (!D?.extrato) return [];
  if (mesFiltrado === 'todos') return D.extrato;
  return D.extrato.filter(g => g.data?.startsWith(mesFiltrado));
}

function catsFiltradas() {
  const gf = gastosFiltrados();
  const m = {};
  gf.forEach(g => { m[g.categoria] = (m[g.categoria] || 0) + g.valor; });
  return Object.fromEntries(Object.entries(m).sort((a,b) => b[1]-a[1]));
}

function totalFiltrado() {
  return gastosFiltrados().reduce((s, g) => s + g.valor, 0);
}

// ─── DADOS DE COMPARAÇÃO ENTRE MESES ─────────────────────────
function getDadosComparacao() {
  const meses = D.mesesDisponiveis || [];
  if (meses.length < 2) return null;

  const mesAtual = meses[meses.length - 1];
  const mesAnterior = meses[meses.length - 2];

  const despAtual    = D.gastosMensais?.[mesAtual]    || 0;
  const despAnterior = D.gastosMensais?.[mesAnterior] || 0;
  const recAtual     = D.receitasMensais?.[mesAtual]    || 0;
  const recAnterior  = D.receitasMensais?.[mesAnterior] || 0;
  const saldoAtual   = recAtual - despAtual;
  const saldoAnterior = recAnterior - despAnterior;

  // Calcular taxa de esforço por mês
  const esforcoAtual    = recAtual    > 0 ? +(despAtual    / recAtual    * 100).toFixed(1) : 0;
  const esforcoAnterior = recAnterior > 0 ? +(despAnterior / recAnterior * 100).toFixed(1) : 0;

  // Maior categoria do mês atual
  const catsMesAtual = {};
  (D.extrato || []).filter(g => g.data?.startsWith(mesAtual)).forEach(g => {
    catsMesAtual[g.categoria] = (catsMesAtual[g.categoria] || 0) + g.valor;
  });
  const topCat = Object.entries(catsMesAtual).sort((a,b)=>b[1]-a[1])[0];

  return {
    mesAtual, mesAnterior,
    despAtual, despAnterior,
    recAtual, recAnterior,
    saldoAtual, saldoAnterior,
    esforcoAtual, esforcoAnterior,
    topCat,
  };
}

// ─── RENDERIZAR CARD DE COMPARAÇÃO ───────────────────────────
function renderComparacao() {
  const cmp = getDadosComparacao();
  const card = document.getElementById('compare-card');
  if (!cmp || !card) { if(card) card.style.display='none'; return; }
  card.style.display = 'block';

  setEl('cmp-badge-prev', fmtMesLabel(cmp.mesAnterior));
  setEl('cmp-badge-curr', fmtMesLabel(cmp.mesAtual));

  const delta = (curr, prev, inverter = false) => {
    if (!prev) return { pct: 0, txt: '—', cls: '' };
    const pct = +((curr - prev) / Math.abs(prev) * 100).toFixed(1);
    const bom  = inverter ? pct < 0 : pct > 0;
    const cor  = pct === 0 ? 'var(--text3)' : bom ? 'var(--green)' : 'var(--red)';
    const bg   = pct === 0 ? 'var(--bg5)' : bom ? 'var(--green2)' : 'var(--red2)';
    const seta = pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
    return { pct, cor, bg, txt: `${seta} ${Math.abs(pct)}%` };
  };

  const dDesp   = delta(cmp.despAtual,    cmp.despAnterior,    true);  // menos despesa = melhor
  const dRec    = delta(cmp.recAtual,     cmp.recAnterior,     false); // mais receita = melhor
  const dSaldo  = delta(cmp.saldoAtual,   cmp.saldoAnterior,   false); // mais saldo = melhor
  const dEsforc = delta(cmp.esforcoAtual, cmp.esforcoAnterior, true);  // menos esforço = melhor

  const itens = [
    { label: 'Despesas',      prev: brl(cmp.despAnterior),          curr: brl(cmp.despAtual),    currCor: 'var(--red)',    d: dDesp },
    { label: 'Receitas',      prev: brl(cmp.recAnterior),           curr: brl(cmp.recAtual),     currCor: 'var(--green)',  d: dRec },
    { label: 'Saldo',         prev: brl(Math.abs(cmp.saldoAnterior)), curr: brl(Math.abs(cmp.saldoAtual)),
      currCor: cmp.saldoAtual >= 0 ? 'var(--green)' : 'var(--red)', d: dSaldo },
    { label: 'Tx. esforço',   prev: cmp.esforcoAnterior + '%',      curr: cmp.esforcoAtual + '%',
      currCor: cmp.esforcoAtual > 90 ? 'var(--red)' : cmp.esforcoAtual > 75 ? 'var(--amber)' : 'var(--green)', d: dEsforc },
  ];

  const grid = document.getElementById('compare-grid');
  if (!grid) return;
  grid.innerHTML = itens.map(item => `
    <div class="cmp-item">
      <div class="cmp-label">${item.label}</div>
      <div class="cmp-row">
        <span class="cmp-mes-lbl">${fmtMesLabel(cmp.mesAnterior)}</span>
        <span class="cmp-val-prev">${item.prev}</span>
      </div>
      <div class="cmp-row" style="margin-top:2px">
        <span class="cmp-mes-lbl" style="color:var(--green)">${fmtMesLabel(cmp.mesAtual)}</span>
        <span class="cmp-val-curr" style="color:${item.currCor}">${item.curr}</span>
      </div>
      <div class="cmp-delta-row">
        <span class="cmp-delta-pill" style="background:${item.d.bg};color:${item.d.cor}">${item.d.txt}</span>
        <span class="cmp-delta-txt">vs mês anterior</span>
      </div>
    </div>`).join('');
}

// ─── LOAD DATA ───────────────────────────────────────────────
async function loadData() {
  document.getElementById('udot').style.display = 'none';
  try {
    const r = await fetch('data.json?v=' + Date.now());
    if (!r.ok) throw new Error('data.json não encontrado (status ' + r.status + ')');
    D = await r.json();
    renderApp();
    document.getElementById('udot').style.display = 'inline-block';
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">Não foi possível carregar os dados</div>
        <div style="font-size:13px;color:var(--text3);max-width:360px;margin:0 auto">${e.message}</div>
        <div class="btn" style="margin:20px auto 0;display:inline-flex" onclick="loadData()">↻ Tentar novamente</div>
      </div>`;
  }
}

// ─── NOVO: GRÁFICO DE TENDÊNCIA ───────────────────────────────
function renderChartTendencia() {
  destroyChart('trend');
  const ctx = document.getElementById('ch-trend');
  if (!ctx || !D.gastosMensais) return;

  const meses       = Object.keys(D.gastosMensais).sort();
  const labels      = meses.map(fmtMesLabel);
  const despesas    = meses.map(m => D.gastosMensais[m]    || 0);
  const receitas    = meses.map(m => D.receitasMensais?.[m] || 0);
  const saldos      = meses.map((m, i) => receitas[i] - despesas[i]);

  // Resumo estatístico
  const avgRec  = receitas.length ? receitas.reduce((s,v)=>s+v,0)/receitas.length : 0;
  const avgDesp = despesas.length ? despesas.reduce((s,v)=>s+v,0)/despesas.length : 0;
  const bestIdx = saldos.reduce((bi, v, i) => v > saldos[bi] ? i : bi, 0);
  setEl('ts-avg-rec', brlK(avgRec));
  setEl('ts-avg-rec-sub', `nos últimos ${receitas.length} mes${receitas.length>1?'es':'`}`);
  setEl('ts-avg-desp', brlK(avgDesp));
  setEl('ts-avg-desp-sub', `nos últimos ${despesas.length} mes${despesas.length>1?'es':''}`);
  setEl('ts-best', brlK(Math.max(...saldos)));
  setEl('ts-best-sub', meses[bestIdx] ? fmtMesLabel(meses[bestIdx]) : '—');

  let datasets = [];

  if (trendView === 'barras') {
    datasets = [
      { label:'Receitas',  data:receitas,
        backgroundColor:'rgba(45,224,139,.22)', borderColor:'#2de08b', borderWidth:2, borderRadius:4,
        type:'bar' },
      { label:'Despesas',  data:despesas,
        backgroundColor:'rgba(255,77,94,.18)',  borderColor:'#ff4d5e', borderWidth:2, borderRadius:4,
        type:'bar' },
    ];
  } else if (trendView === 'linha') {
    datasets = [
      { label:'Receitas', data:receitas, borderColor:'#2de08b', backgroundColor:'rgba(45,224,139,.08)',
        borderWidth:2.5, fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#2de08b',
        pointHoverRadius:6, type:'line' },
      { label:'Despesas', data:despesas, borderColor:'#ff4d5e', backgroundColor:'rgba(255,77,94,.08)',
        borderWidth:2.5, fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#ff4d5e',
        pointHoverRadius:6, type:'line' },
    ];
  } else {
    // Saldo: barras verdes/vermelhas + linha de tendência
    const trend = calcTrendLine(saldos);
    datasets = [
      { label:'Saldo', data:saldos,
        backgroundColor: saldos.map(v => v >= 0 ? 'rgba(45,224,139,.30)' : 'rgba(255,77,94,.30)'),
        borderColor:     saldos.map(v => v >= 0 ? '#2de08b' : '#ff4d5e'),
        borderWidth:2, borderRadius:4, type:'bar' },
      { label:'Tendência', data:trend, borderColor:'rgba(80,151,255,.7)', borderWidth:1.5,
        borderDash:[5,4], pointRadius:0, fill:false, tension:0, type:'line' },
    ];
  }

  charts['trend'] = new Chart(ctx.getContext('2d'), {
    type: trendView === 'barras' ? 'bar' : 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'rgba(17,21,32,.95)',
          borderColor:'rgba(255,255,255,.08)',
          borderWidth:1,
          titleColor:'#8b93b0',
          bodyColor:'#e8ecf8',
          padding:10,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${brl(ctx.parsed.y)}`
          }
        }
      },
      scales: {
        x: { grid:GRID, ticks:TICK },
        y: { grid:GRID, ticks:{ ...TICK, callback: v => brlK(v) } }
      }
    }
  });
}

// Linha de regressão linear simples para a view "Saldo"
function calcTrendLine(data) {
  const n = data.length;
  if (n < 2) return data;
  const xs = Array.from({length:n}, (_,i)=>i);
  const sumX  = xs.reduce((s,v)=>s+v, 0);
  const sumY  = data.reduce((s,v)=>s+v, 0);
  const sumXY = xs.reduce((s,x,i)=>s+x*data[i], 0);
  const sumX2 = xs.reduce((s,x)=>s+x*x, 0);
  const m = (n*sumXY - sumX*sumY) / (n*sumX2 - sumX*sumX);
  const b = (sumY - m*sumX) / n;
  return xs.map(x => +(m*x+b).toFixed(2));
}

  destroyChart('cpie');
  const ctx = document.getElementById('ch-cartao-pie');
  if (!ctx) return;
  const entries = Object.entries(dados).filter(([,v])=>v.total>0);
  const nomes   = entries.map(([,v])=>v.nome);
  const totais  = entries.map(([,v])=>v.total);
  const total   = totais.reduce((s,v)=>s+v,0);
  const coresP  = ['#2de08b88','#f9731688','#3b82f688'];
  const coresPB = ['#2de08b','#f97316','#3b82f6'];
  charts['cpie'] = new Chart(ctx.getContext('2d'), {
    type:'doughnut',
    data:{labels:nomes, datasets:[{data:totais, backgroundColor:coresP, borderColor:coresPB, borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',plugins:{legend:{display:false}}}
  });
  const leg = document.getElementById('cartao-pie-legend');
  if (leg) leg.innerHTML = entries.map(([,v],i)=>`
    <div style="display:flex;align-items:center;gap:6px">
      <span style="width:8px;height:8px;border-radius:2px;background:${coresPB[i]};flex-shrink:0"></span>
      <span style="flex:1;color:var(--text2)">${v.nome}</span>
      <span style="font-family:var(--mono);color:var(--text);font-size:11px">${total>0?(v.total/total*100).toFixed(0):0}%</span>
    </div>`).join('');
}

// ─── EXTRATO ──────────────────────────────────────────────────
function setupExtrato() {
  const cats = [...new Set((D.extrato||[]).map(g=>g.categoria))].sort();
  const fcat = document.getElementById('f-cat-ext');
  if (fcat) fcat.innerHTML = '<option value="">Todas categorias</option>' +
    cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  const fmes = document.getElementById('f-mes-ext');
  if (fmes && D.mesesDisponiveis) {
    fmes.innerHTML = '<option value="">Todos os meses</option>' +
      D.mesesDisponiveis.map(m=>`<option value="${m}">${fmtMesLabel(m)}</option>`).join('');
    if (mesFiltrado !== 'todos') fmes.value = mesFiltrado;
  }
  ['f-mes-ext','f-cat-ext','f-tipo-ext','f-cartao-ext'].forEach(id=>{
    const e = document.getElementById(id);
    if (e) e.addEventListener('change', filtrarExtrato);
  });
  const fb = document.getElementById('f-busca-ext');
  if (fb) fb.addEventListener('input', filtrarExtrato);
  filtrarExtrato();
}

function filtrarPorCat(cat) {
  const fc = document.getElementById('f-cat-ext');
  if (fc) { fc.value = cat; filtrarExtrato(); }
}

function filtrarExtrato() {
  const mes    = document.getElementById('f-mes-ext')?.value   || '';
  const cat    = document.getElementById('f-cat-ext')?.value   || '';
  const tipo   = document.getElementById('f-tipo-ext')?.value  || '';
  const cartao = document.getElementById('f-cartao-ext')?.value|| '';
  const busca  = (document.getElementById('f-busca-ext')?.value||'').toLowerCase();
  let rows = D?.extrato || [];
  if (mes)    rows = rows.filter(r=>r.data?.startsWith(mes));
  if (cat)    rows = rows.filter(r=>r.categoria===cat);
  if (tipo==='cartao')  rows = rows.filter(r=>r.cartao);
  if (tipo==='debito')  rows = rows.filter(r=>!r.cartao);
  if (cartao==='debito')rows = rows.filter(r=>!r.cartao);
  else if(cartao)       rows = rows.filter(r=>r.cartao===cartao);
  if (busca)  rows = rows.filter(r=>r.descricao?.toLowerCase().includes(busca)||r.categoria?.toLowerCase().includes(busca));
  const tbody = document.getElementById('etab-body');
  if (!tbody) return;
  tbody.innerHTML = rows.slice(0,200).map(r=>{
    const cartaoNome = r.cartao ? (r.cartao==='5217'?'Itaú 5217':r.cartao==='7398'?'Latam 7398':'Cartão '+r.cartao) : null;
    const origemPill = cartaoNome
      ? `<span class="pill pill-cartao">${cartaoNome}</span>`
      : `<span class="pill pill-debito">Conta/Déb</span>`;
    return `<tr>
      <td style="color:var(--text3);white-space:nowrap">${fmtData(r.data)}</td>
      <td style="max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.descricao}">${r.descricao||'—'}</td>
      <td><span class="pill">${r.categoria||'Outros'}</span></td>
      <td>${origemPill}</td>
      <td class="v-neg">-${brl(r.valor)}</td>
    </tr>`;
  }).join('');
  const total = rows.reduce((s,r)=>s+(r.valor||0),0);
  setEl('etab-count', rows.length + ' lançamentos');
  const te = document.getElementById('etab-total');
  if (te) { te.textContent = brl(total); te.style.color = 'var(--red)'; }
}

// ─── DÍVIDAS ──────────────────────────────────────────────────
function renderDividas() {
  const debt = D.debt||{};
  const saldo = debt.saldo_devedor||35000;
  const pagas = debt.parcelas_pagas||0;
  const total = debt.total_parcelas||30;
  const pct   = Math.round(pagas/total*100);
  setEl('d-saldo', brl(saldo));
  setEl('d-pagas-lbl', `${pagas} de ${total} parcelas pagas`);
  setEl('d-pct', pct+'%');
  const dp = document.getElementById('d-prog');
  if (dp) setTimeout(()=>{ dp.style.width=pct+'%'; },100);
  const list = document.getElementById('parcela-list');
  if (list) list.innerHTML = (debt.proximas_parcelas||[]).slice(0,8).map((p,i)=>`
    <div class="parcela ${i===0?'prox':''}">
      <span class="p-num">#${p.parcela}</span>
      <span class="p-data">${fmtData(p.data)}</span>
      <span class="p-lbl">${i===0?'→ Próxima':'Parcela'}</span>
      ${p.mes_plr?'<span class="p-plr">+R$4.000 PLR</span>':''}
      <span class="p-val">${brl(p.valor_total)}</span>
    </div>`).join('');
  setTimeout(()=>{
    destroyChart('div');
    const ctx = document.getElementById('ch-divida');
    if (!ctx || !(debt.amortizacao||[]).length) return;
    const labels = debt.amortizacao.map(p=>fmtData(p.data));
    const vals   = debt.amortizacao.map(p=>p.saldo_apos);
    charts['div'] = new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{labels, datasets:[{label:'Saldo devedor',data:vals,borderColor:'#ff4d5e',backgroundColor:'rgba(255,77,94,.07)',borderWidth:2,fill:true,tension:0.35,pointRadius:2,pointBackgroundColor:'#ff4d5e'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:GRID,ticks:{...TICK,maxTicksLimit:8}},y:{grid:GRID,ticks:{...TICK,callback:v=>brlK(v)}}}}
    });
  },50);
}

function calcSim() {
  const extra = parseFloat(document.getElementById('sim-extra')?.value)||0;
  const res   = document.getElementById('sim-result');
  if (!res) return;
  if (extra<=0) { res.className='sim-result'; return; }
  let saldo  = D.debt?.saldo_devedor||35000;
  let meses  = 0;
  const pend = (D.debt?.amortizacao||[]).filter(p=>p.status!=='Paga');
  for (const p of pend) { if(saldo<=0)break; saldo-=(p.valor_total+extra); meses++; }
  while(saldo>0&&meses<60){saldo-=(500+extra);meses++;}
  const mEcon = Math.max(0, pend.length-meses);
  const dt = new Date((pend[0]?.data||new Date().toISOString().slice(0,10))+'T12:00:00');
  dt.setMonth(dt.getMonth()+meses-1);
  const dtLabel = dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  res.className='sim-result show';
  res.innerHTML=`Com <span class="hl-g">${brl(extra)}</span> extra/mês → quitação em <span class="hl-g">${dtLabel}</span><br>
    Economizando <span class="hl-g">${mEcon} ${mEcon===1?'mês':'meses'}</span> de parcelas
    ${mEcon>0?`<br>Redução de <span class="hl-a">${brl(mEcon*500)}</span> no total pago`:''}`;
}

// ─── PLANEJAMENTO ─────────────────────────────────────────────
function renderPlanejamento() {
  const rEl = document.getElementById('plan-rec');
  const rf  = D.receitasFixas||[];
  if (rEl) {
    const tot = rf.reduce((s,r)=>s+r.valor,0);
    rEl.innerHTML = rf.map(r=>`<div class="fix-row"><span class="fix-lbl">${r.descricao}</span><span style="color:var(--green);font-family:var(--mono)">${brl(r.valor)}</span></div>`).join('') +
      `<div class="fix-row"><span class="fix-lbl">Total</span><span style="color:var(--green);font-family:var(--mono)">${brl(tot)}</span></div>`;
  }
  const dEl = document.getElementById('plan-desp');
  const dr  = D.despesasRecorrentes||[];
  if (dEl) {
    const tot = dr.reduce((s,d)=>s+d.valor,0);
    dEl.innerHTML = dr.map(d=>`<div class="fix-row"><span class="fix-lbl">${d.descricao}</span><span style="color:var(--red);font-family:var(--mono)">${brl(d.valor)}</span></div>`).join('') +
      `<div class="fix-row"><span class="fix-lbl">Total</span><span style="color:var(--red);font-family:var(--mono)">${brl(tot)}</span></div>`;
  }
  const envEl = document.getElementById('envelopes');
  const ess   = D.custosEssenciais||{};
  if (envEl) {
    const mkEnv = (nome,icon,items,cor,lim)=>{
      const tot = items.reduce((s,i)=>s+i.valor,0);
      const pct = Math.min(tot/lim*100,100);
      return `<div class="envelope">
        <div class="env-header"><span style="font-size:14px;font-weight:600">${icon} ${nome}</span><span style="font-size:13px;font-family:var(--mono);color:${cor}">${brl(tot)} / ${brl(lim)}</span></div>
        <div class="env-bar"><div class="env-fill" style="width:${pct}%;background:${cor}"></div></div>
        <div style="font-size:11px;color:var(--text3)">${items.map(i=>`${i.nome}: ${brl(i.valor)}`).join(' • ')} • Restam ${brl(lim-tot)}</div>
      </div>`;
    };
    envEl.innerHTML =
      mkEnv('Ana Lua','👶',ess.ana_lua||[],'var(--blue)',760) +
      mkEnv('Mandelinha','🐾',ess.mandelinha||[],'var(--amber)',200);
  }
  setTimeout(()=>{
    destroyChart('proj');
    const ctx  = document.getElementById('ch-proj');
    const proj = D.projecaoMensal||[];
    if (!ctx||!proj.length) return;
    const labels = proj.map(p=>p.mes);
    const saldos = proj.map(p=>(p.salario_previsto||0)-(p.despesas_recorrentes||0)-(p.parcela_emprestimo||0)-(p.parcela_semestral||0));
    charts['proj'] = new Chart(ctx.getContext('2d'),{
      type:'bar',
      data:{labels, datasets:[{label:'Saldo projetado',data:saldos,
        backgroundColor:saldos.map(v=>v>=0?'rgba(45,224,139,.28)':'rgba(255,77,94,.28)'),
        borderColor:saldos.map(v=>v>=0?'#2de08b':'#ff4d5e'),borderWidth:2,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:GRID,ticks:TICK},y:{grid:GRID,ticks:{...TICK,callback:v=>brlK(v)}}}}
    });
  },50);
}

// ─── INIT ─────────────────────────────────────────────────────
loadData();
</script>
